<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Layouts · layout.page</title>
<script>(function(){try{if(localStorage.getItem('lp-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');if(localStorage.getItem('lp-nav-collapsed')==='1')document.documentElement.classList.add('nav-collapsed');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="layout-system/site.css" rel="stylesheet">
<link href="layout-system/system.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: { surface:'var(--bg)', ink:'var(--ink)', muted:'var(--muted)', line:'var(--line)', card:'var(--card)', panel:'var(--panel)', royal:'#4337FF' },
  fontFamily: { sans:['Funnel Sans','system-ui','sans-serif'], mono:['Geist Mono','ui-monospace','Menlo','monospace'] }
} } }
</script>
<style>
  body{font-family:'Funnel Sans','system-ui',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45}
  .thumb{position:relative;overflow:hidden;background:var(--bg);height:260px}
  .thumb-inner{width:1100px;transform-origin:top left;pointer-events:none}
  .pcard{transition:.12s;display:flex;flex-direction:column}.pcard:hover{background:var(--panel)}
  .viewlink{display:inline-flex;align-items:center;gap:6px;font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:0.05em;text-transform:uppercase;color:#4337FF}.viewlink:hover{text-decoration:underline}
</style>
</head>
<body class="antialiased" data-page="layouts" data-title="Page Layouts">
<div class="flex min-h-screen max-w-[1600px] mx-auto">
  <aside id="lp-nav" class="lp-nav hidden md:flex"></aside>

  <main class="flex-1 min-w-0 border-l border-line">
    <!-- top bar injected by nav.js -->

    <section class="lp-hero">
      <h1 class="ts-page-hero">Page Layouts</h1>
      <div class="lp-hero-text">
        <p class="subhead">Full-page compositions built from reusable sections.</p>
        <p class="lp-hero-support">Preview an entire page in any Design System and Mode — same structure, different system.</p>
      </div>
    </section>

    <section class="grid sm:grid-cols-2 border-t border-l border-line" id="pl-grid"></section>
  </main>
</div>

<script src="layout-system/sections-data.js"></script>
<script>
  const byId = Object.fromEntries(window.LP_SECTIONS.map(s=>[s.id,s]));
  const grid = document.getElementById('pl-grid');
  function card(L){
    const a = document.createElement('a');
    a.href = 'page-layout.html?id='+L.id;
    a.className = 'pcard border-r border-b border-line';
    const stack = L.sections.map(id=>byId[id]?byId[id].html:'').join('');
    const tags = (L.tags||[]).map(t=>'<span class="meta-pill">'+t+'</span>').join(' ');
    a.innerHTML =
      '<div class="browser-bar"><span class="browser-dot"></span><span class="browser-dot"></span><span class="browser-dot"></span><span class="browser-addr"></span></div>'+
      '<div class="thumb border-b border-line"><div class="thumb-inner sx-canvas" data-system="'+L.styleSystem+'" data-mode="neutral">'+stack+'</div></div>'+
      '<div class="p-7 stack stack-3 flex-1">'+
        '<div class="flex items-start justify-between gap-3"><h2 class="text-[22px]">'+L.title+'</h2><span class="meta-pill shrink-0">'+L.sections.length+' sections</span></div>'+
        '<p class="text-[16px]" style="color:var(--muted);max-width:60ch">'+L.description+'</p>'+
        '<div class="flex flex-wrap gap-1.5">'+tags+'</div>'+
        '<span class="lpbtn lpbtn--primary lpbtn--sm lpbtn--full mt-auto"><i data-lucide="corner-down-right" class="ico"></i> View layout</span>'+
      '</div>';
    return a;
  }
  window.LP_PAGE_LAYOUTS.forEach(L=>grid.appendChild(card(L)));
  // coming-soon placeholder
  ['SaaS Product Homepage','Ecommerce Storefront'].forEach(n=>{
    const d=document.createElement('div');
    d.className='border-r border-b border-line p-7 flex flex-col justify-center';
    d.style.minHeight='360px';
    d.innerHTML='<div class="meta-pill mb-3" style="color:var(--royal);background:transparent;border:1px solid var(--royal);width:fit-content">Coming soon</div><h2 class="text-[22px]" style="color:var(--muted)">'+n+'</h2><p class="text-[16px] mt-2 max-w-[40ch]" style="color:var(--muted)">Another full-page composition built from the same reusable sections.</p>';
    grid.appendChild(d);
  });
  function scaleThumbs(){document.querySelectorAll('.thumb').forEach(t=>{t.querySelector('.thumb-inner').style.transform='scale('+(t.clientWidth/1100)+')';});}
  scaleThumbs(); window.addEventListener('resize',scaleThumbs);
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="layout-system/nav.js"></script>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.25, width: 16, height: 16 } }); setTimeout(()=>{document.querySelectorAll('.thumb').forEach(t=>{t.querySelector('.thumb-inner').style.transform='scale('+(t.clientWidth/1100)+')';});},60);</script>
</body>
</html>
