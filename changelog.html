<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Changelog · layout.page</title>
<script>(function(){try{if(localStorage.getItem('lp-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');if(localStorage.getItem('lp-nav-collapsed')==='1')document.documentElement.classList.add('nav-collapsed');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="layout-system/site.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: { surface:'var(--bg)', ink:'var(--ink)', muted:'var(--muted)', line:'var(--line)', card:'var(--card)', panel:'var(--panel)', royal:'#4337FF' },
  fontFamily: { sans:['Funnel Sans','system-ui','sans-serif'], mono:['Geist Mono','ui-monospace','Menlo','monospace'] }
} } }
</script>
<style>
  body{font-family:'Funnel Sans','system-ui',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45}
  .cl-entry{display:grid;grid-template-columns:200px 1fr;gap:32px;padding:36px 0;border-top:1px solid var(--line)}
  .cl-changes{display:flex;flex-direction:column;gap:8px;padding-left:18px;list-style:disc}
  .cl-changes li{font-size:16px;line-height:1.5;color:var(--ink)}
  @media(max-width:760px){.cl-entry{grid-template-columns:1fr;gap:14px}}
</style>
</head>
<body class="antialiased" data-page="changelog" data-title="Changelog">
<div class="flex min-h-screen max-w-[1600px] mx-auto">
  <aside id="lp-nav" class="lp-nav hidden md:flex"></aside>

  <main class="flex-1 min-w-0 border-l border-line">
    <!-- top bar injected by nav.js -->

    <section class="lp-hero">
      <h1 class="ts-page-hero">Changelog</h1>
      <div class="lp-hero-text">
        <p class="subhead">What's new in layout.page.</p>
        <p class="lp-hero-support">New sections, Design Systems, page layouts, and product improvements — shipped continuously.</p>
      </div>
    </section>

    <section class="px-10 py-4" id="cl-list"></section>
  </main>
</div>

<script>
  const ENTRIES = [
    { v:'0.7', date:'Jun 16, 2026', title:'Docs, Changelog & a unified component set', changes:[
      'Added Docs with the "Build a Website with Claude" guide, and this Changelog.',
      'Consolidated every action into one button system (primary / secondary / inverse / small) with a leading arrow.',
      'Standardized inline links; card labels are now pills; section examples sit inside an abstract browser frame.'
    ]},
    { v:'0.6', date:'Jun 2026', title:'Page Layouts + live section pages', changes:[
      'New Page Layouts listing, plus a full-page preview that re-skins every section at once.',
      'Each section now has its own live page with a mode switcher, metadata, and copy actions.',
      'Top bars became breadcrumbs; added an internal Style Guide for design-system review.'
    ]},
    { v:'0.5', date:'Jun 2026', title:'Data-driven Section Library', changes:[
      'Built 11 reusable, token-based sections (header, hero, social proof, features, content, services, CTA, footer).',
      'Section Library renders live previews filterable by Category, Structure, Design System, and Mode.',
      'Added the Operational Consulting Homepage page layout.'
    ]},
    { v:'0.4', date:'Jun 2026', title:'Structured Editorial Design System', changes:[
      'Grayscale-first Design System with Neutral, Dark, and Color Example modes.',
      'Token contract (--sx-*) so sections re-skin via a single attribute swap.',
      'Detail page with typography, color, spacing, components, and copy-for-Claude reference.'
    ]},
    { v:'0.3', date:'May 2026', title:'Shared site template', changes:[
      'Collapsible icon-rail navigation, a navy top bar, and a footer on every page.',
      'One shared site.css + nav.js so the whole site stays consistent.'
    ]},
    { v:'0.2', date:'May 2026', title:'Type & spacing foundation', changes:[
      'Funnel Sans + Geist Mono type system on a 6px spacing rhythm with thin hairline borders.'
    ]},
    { v:'0.1', date:'May 2026', title:'layout.page concept', changes:[
      'First version of the structure-first section library: same structure, different system.'
    ]}
  ];
  const list = document.getElementById('cl-list');
  ENTRIES.forEach(e=>{
    const row = document.createElement('div');
    row.className = 'cl-entry';
    const changes = e.changes.map(c=>'<li>'+c+'</li>').join('');
    row.innerHTML =
      '<div class="flex flex-col gap-3 items-start">'+
        '<span class="meta-pill" style="color:#4337FF;background:transparent;border:1px solid #4337FF">v'+e.v+'</span>'+
        '<span class="lbl">'+e.date+'</span>'+
      '</div>'+
      '<div class="flex flex-col gap-3">'+
        '<h2 style="font-size:var(--lp-heading-sm)">'+e.title+'</h2>'+
        '<ul class="cl-changes">'+changes+'</ul>'+
      '</div>';
    list.appendChild(row);
  });
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="layout-system/nav.js"></script>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.25, width: 16, height: 16 } });</script>
</body>
</html>
