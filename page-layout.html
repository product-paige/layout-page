<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operational Consulting Homepage · Page Layouts · layout.page</title>
<script>(function(){try{if(localStorage.getItem('lp-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');if(localStorage.getItem('lp-nav-collapsed')==='1')document.documentElement.classList.add('nav-collapsed');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="layout-system/site.css" rel="stylesheet">
<link href="layout-system/system.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: { surface:'var(--bg)', ink:'var(--ink)', muted:'var(--muted)', line:'var(--line)', card:'var(--card)', panel:'var(--panel)', royal:'#4337FF' },
  fontFamily: { sans:['Funnel Sans','system-ui','sans-serif'], mono:['Geist Mono','ui-monospace','Menlo','monospace'] }
} } }
</script>
<style>
  body{font-family:'Funnel Sans','system-ui',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45}
  .modebtn{font-family:'Geist Mono',monospace;text-transform:uppercase;font-size:12px;letter-spacing:.05rem;padding:7px 13px;border:1px solid var(--line);color:var(--muted);cursor:pointer;background:transparent;transition:.12s}
  .modebtn:hover{color:var(--ink);border-color:var(--ink)}.modebtn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .syspill{font-family:'Geist Mono',monospace;text-transform:uppercase;font-size:12px;letter-spacing:.05rem;padding:7px 13px;border:1px solid var(--line);color:var(--ink);background:var(--card)}
  .seclist a{display:block;font-family:'Geist Mono',monospace;text-transform:uppercase;font-size:12px;letter-spacing:.04em;color:var(--muted);padding:4px 0}
  .seclist a:hover{color:var(--ink)}
</style>
</head>
<body class="antialiased" data-page="layouts" data-crumb-href="page-layouts.html">
<div class="flex min-h-screen max-w-[1600px] mx-auto">
  <aside id="lp-nav" class="lp-nav hidden md:flex"></aside>

  <main class="flex-1 min-w-0 border-l border-line">
    <!-- top bar injected by nav.js -->

    <!-- meta + controls -->
    <section class="lp-hero">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div class="lp-hero-text">
          <div class="lbl">Page Layout · Structured Editorial</div>
          <h1 id="plTitle">Operational Consulting Homepage</h1>
          <p class="lp-hero-support" id="plSupport">A full homepage composed entirely from reusable sections. Switch modes to re-skin every section at once — same structure, different system.</p>
        </div>
        <div class="flex items-center gap-3">
          <span class="lbl">Mode</span>
          <div class="flex gap-2">
            <button class="modebtn active" data-mode="neutral">Neutral</button>
            <button class="modebtn" data-mode="dark">Dark</button>
            <button class="modebtn" data-mode="color">Color</button>
          </div>
        </div>
      </div>
    </section>

    <!-- live full-page preview -->
    <div class="px-10 py-10" style="background:var(--panel)">
      <div class="browser">
        <div class="browser-bar"><span class="browser-dot"></span><span class="browser-dot"></span><span class="browser-dot"></span><span class="browser-addr"></span></div>
        <div class="sx-canvas browser-body" data-system="structured-editorial" data-mode="neutral" id="pagePreview"></div>
      </div>
      <p class="lbl mt-4" id="sectionCount"></p>
    </div>
  </main>
</div>

<script src="layout-system/sections-data.js"></script>
<script>
  const _pid = new URLSearchParams(location.search).get('id');
  const layout = window.LP_PAGE_LAYOUTS.find(l=>l.id===_pid) || window.LP_PAGE_LAYOUTS[0];
  document.body.dataset.title = 'Page Layouts / ' + layout.title;
  document.getElementById('plTitle').textContent = layout.title;
  document.getElementById('plSupport').textContent = layout.description;
  const byId = Object.fromEntries(window.LP_SECTIONS.map(s=>[s.id,s]));
  const host = document.getElementById('pagePreview');
  host.innerHTML = layout.sections.map(id => (byId[id]?byId[id].html:'')).join('\n');
  document.getElementById('sectionCount').textContent = layout.sections.length + ' sections · ' + layout.sections.join('  ·  ');
  // mode switcher re-skins the whole page at once
  document.querySelectorAll('.modebtn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.modebtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    host.setAttribute('data-mode', b.dataset.mode);
  }));
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="layout-system/nav.js"></script>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.25, width: 18, height: 18 } });</script>
</body>
</html>
